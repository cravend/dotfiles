- defaults:
    link:
      relink: true

- clean: ["~"]

- create:
    - ~/Library/Application Support/Cursor/User
    - ~/.config/gh

- link:
    ~/.zshrc: links/zshrc
    ~/.gitconfig: links/gitconfig
    ~/.config/nvim: links/nvim
    ~/Library/Application Support/Cursor/User/settings.json:
      path: links/cursor/settings.json
      force: true
    ~/Library/Application Support/Cursor/User/keybindings.json:
      path: links/cursor/keybindings.json
      force: true
    ~/.config/gh/config.yml:
      path: links/gh/config.yml
      force: true

- shell:
    - command: command -v brew >/dev/null 2>&1 && (eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null)" 2>/dev/null; eval "$(/usr/local/bin/brew shellenv 2>/dev/null)" 2>/dev/null; brew install eza fzf gh neovim)
      description: Installing eza, fzf, gh, neovim
      quiet: true
    - command: test -d ~/.bun || curl -fsSL https://bun.sh/install | bash
      description: Installing bun
      quiet: true
    - command: test -d ~/.nvm || PROFILE=/dev/null bash -c 'curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash'
      description: Installing nvm
      quiet: true
    - command: git submodule update --init --recursive
      description: Installing submodules
      quiet: true
    - command: curl -o ./zsh/custom/themes/cravend.zsh-theme https://raw.githubusercontent.com/cravend/theme/main/cravend.zsh-theme
      description: Installing cravend.theme
      quiet: true
    - command: sh -c 'curl -fLo "${XDG_DATA_HOME:-$HOME/.local/share}"/nvim/site/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim'
      description: Installing vim-plug
      quiet: true
    - command: touch ~/.hushlogin
      description: Creating .hushlogin
      quiet: true
